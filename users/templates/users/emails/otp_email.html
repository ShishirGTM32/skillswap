<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ heading }} — skillswap</title>
</head>
<body style="margin:0;padding:0;background-color:#dce4ec;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#dce4ec;">
    <tr>
      <td align="center" style="padding:28px 14px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;background-color:#ffffff;border-radius:4px;overflow:hidden;box-shadow:0 4px 24px rgba(5,28,44,0.12);">
          <tr>
            <td style="background:linear-gradient(135deg, #031525 0%, #0a3d62 42%, #051c2c 100%);background-color:#051c2c;padding:22px 24px;text-align:center;border-bottom:3px solid #39ff14;">
              <span style="font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:26px;font-weight:700;letter-spacing:0.14em;color:#39ff14;text-transform:lowercase;">skillswap</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 28px 28px;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a2332;">
              <h1 style="margin:0 0 22px;font-size:22px;font-weight:700;text-align:center;color:#051c2c;line-height:1.3;">{{ heading }}</h1>
              <p style="margin:0 0 14px;font-size:15px;line-height:1.65;color:#2c3544;">Hello <strong style="color:#051c2c;">{{ recipient_name }}</strong>,</p>
              <p style="margin:0 0 26px;font-size:15px;line-height:1.65;color:#3d4a5c;">{{ instruction }}</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td align="center" style="padding:8px 0 20px;">
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="border:2px dashed #39ff14;background-color:#e8f4fc;border-radius:8px;">
                      <tr>
                        <td style="padding:22px 28px;font-family:'Consolas','Segoe UI Mono',Monaco,monospace;font-size:30px;font-weight:700;letter-spacing:0.28em;color:#0a3d6b;text-align:center;">{{ otp }}</td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 14px;font-size:14px;line-height:1.65;color:#3d4a5c;">This code will expire in <strong style="color:#0a3d6b;">{{ otp_minutes }} minutes.</strong></p>
              <p style="margin:0 0 22px;font-size:14px;line-height:1.65;color:#5a6678;">If you did not request this, you can safely ignore this email.</p>
              <p style="margin:0;font-size:14px;line-height:1.65;color:#2c3544;">Thank You,<br><strong style="color:#051c2c;">SkillSwap Team</strong></p>
            </td>
          </tr>
          <tr>
            <td style="background:linear-gradient(135deg, #031525 0%, #0a3d62 100%);background-color:#051c2c;padding:18px 24px;text-align:center;border-top:3px solid #39ff14;">
              <a href="{{ site_url }}" style="font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;font-weight:600;color:#39ff14;text-decoration:none;">Visit us: {{ site_url }}</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
